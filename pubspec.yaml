name: flutter_storybook_components
description: A clean Flutter component workspace.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  widgetbook: ^3.23.0
  inspector: ^4.0.0
  device_frame_plus: ^1.5.0
  phosphoricons_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/superfans-logo-white.png
    - assets/images/superfans-mark.png
  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree-Regular.ttf
          weight: 400
        - asset: assets/fonts/Figtree-Regular.ttf
          weight: 500
        - asset: assets/fonts/Figtree-Regular.ttf
          weight: 600
        - asset: assets/fonts/Figtree-Regular.ttf
          weight: 700
